name: 가이드북 배포 (MkDocs → GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: MkDocs 빌드 검증
        run: mkdocs build --strict

      - name: GitHub Pages 배포
        run: mkdocs gh-deploy --force --clean
