name: 가이드북 배포 (MkDocs → GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: WeasyPrint 시스템 의존성 설치 (GTK / Pango)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 오프라인 산출물 빌드 (MD + DOCX + PDF)
        run: python scripts/build_guidebook.py --format all

      - name: 다운로드 에셋 복사 (docs/assets/downloads)
        run: |
          mkdir -p docs/assets/downloads
          cp output/Guidebook.pdf docs/assets/downloads/Guidebook.pdf
          cp output/Guidebook.docx docs/assets/downloads/Guidebook.docx

      - name: MkDocs 빌드 검증
        run: mkdocs build --strict

      - name: GitHub Pages 배포
        run: mkdocs gh-deploy --force --clean
