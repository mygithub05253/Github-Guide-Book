site_name: GitHub 인기 레포지토리 & AI 개발 도구 완전 활용 가이드북
site_description: 대학생 개발자를 위한 실전 GitHub 레포지토리 활용 가이드 (Claude Code + GSTACK + MCP)
site_author: mygithub05253
site_url: https://mygithub05253.github.io/Github-Guide-Book/
repo_url: https://github.com/mygithub05253/Github-Guide-Book
repo_name: mygithub05253/Github-Guide-Book
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 mygithub05253

docs_dir: docs

theme:
  name: material
  language: ko
  features:
    - navigation.instant       # SPA 스타일 즉시 로딩
    - navigation.tracking      # 스크롤에 따라 URL 갱신
    - navigation.tabs          # 상단 탭으로 파트 구분
    - navigation.sections      # 사이드바 섹션 그룹화
    - navigation.expand        # 사이드바 자동 펼치기
    - navigation.indexes       # 섹션 index.md 지원
    - navigation.top           # "맨 위로" 버튼
    - navigation.footer        # 이전/다음 페이지 푸터
    - search.suggest           # 검색어 자동완성
    - search.highlight         # 검색 결과 하이라이트
    - search.share             # 검색 결과 공유 링크
    - toc.follow               # 우측 목차 스크롤 따라가기
    - content.code.copy        # 코드 블록 복사 버튼
    - content.code.annotate    # 코드 주석 인터랙티브
    - content.tabs.link        # 탭 동기화
    - content.action.edit      # "이 페이지 수정" 링크
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

# 마크다운 확장 (admonition, codeblocks, tabs 등)
markdown_extensions:
  - abbr
  - admonition                  # !!! note 콜아웃
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details            # 접을 수 있는 콜아웃
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys               # ++ctrl+c++ 키보드 표시
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:       # 중첩 코드/다이어그램 지원
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true     # 탭 그룹
  - pymdownx.tasklist:
      custom_checkbox: true     # - [ ] 체크박스 스타일링
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - ko
        - en
  # awesome-pages: .pages 파일로 nav 자동 구성 (Phase 1 후반에 활용)
  # - awesome-pages
  # mkdocs-with-pdf: 한 권의 PDF 동시 생성 (Phase 6에서 활성화)
  # - with-pdf:
  #     output_path: ../output/Guidebook.pdf
  #     cover_title: GitHub 인기 레포지토리 & AI 개발 도구 활용 가이드북
  #     cover_subtitle: 대학생 개발자를 위한 실전 매뉴얼

