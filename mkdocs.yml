          - Next.js: roadmap/frontend/nextjs/index.md
          - Tailwind CSS: roadmap/frontend/tailwind/index.md
          - Zustand: roadmap/frontend/zustand/index.md
      - "백엔드":
          - Spring Boot: roadmap/backend/springboot/index.md
          - FastAPI: roadmap/backend/fastapi/index.md
          - NestJS: roadmap/backend/nestjs/index.md
          - Django: roadmap/backend/django/index.md
          - Express: roadmap/backend/express/index.md
      - "AI / 데이터":
